services:
  neo4j:
    image: 'neo4j:2026.05-trixie'
    environment:
      - 'NEO4J_AUTH=neo4j/notverysecret'
    ports:
      - '7687:7687'  # Bolt
      - '7474:7474'  # HTTP for Neo4j Browser
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p notverysecret 'RETURN 1;' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 20s

  valkey:
    image: valkey/valkey:9.1.0-alpine
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: [ "valkey-server", "--appendonly", "yes" ]

volumes:
  valkey_data:
  neo4j_data:
