<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="760px" preserveAspectRatio="none" style="width:620px;height:760px;background:#FFFFFF;" version="1.1" viewBox="0 0 620 760" width="620px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="12" fill="#000000" stroke="#181818">
    <ellipse cx="310" cy="22" rx="10" ry="10" fill="#222222" stroke="#222222"/>

    <rect x="130" y="52" width="360" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="70" text-anchor="middle">The user starts SSH port forwarding to the</text>
    <text x="310" y="85" text-anchor="middle">remote GraphleManager</text>

    <rect x="132" y="116" width="356" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="134" text-anchor="middle">The user configures the server URL to the</text>
    <text x="310" y="149" text-anchor="middle">forwarded local port</text>

    <rect x="200" y="192" width="220" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="215" text-anchor="middle">The user opens the Graphle GUI</text>

    <polygon points="310,258 410,296 310,334 210,296" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="293" text-anchor="middle" font-size="11">Connection</text>
    <text x="310" y="308" text-anchor="middle" font-size="11">established?</text>

    <rect x="128" y="364" width="364" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="382" text-anchor="middle">GraphleManager opens the configured home</text>
    <text x="310" y="397" text-anchor="middle">location on the remote machine</text>

    <rect x="116" y="436" width="388" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="454" text-anchor="middle">The application shows neighbors from the remote</text>
    <text x="310" y="469" text-anchor="middle">filesystem</text>

    <rect x="150" y="508" width="320" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="526" text-anchor="middle">The user selects a file or folder</text>
    <text x="310" y="541" text-anchor="middle">and continues browsing</text>

    <rect x="120" y="580" width="380" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="598" text-anchor="middle">GraphleManager reads paths on the remote</text>
    <text x="310" y="613" text-anchor="middle">machine and updates the current view</text>

    <rect x="430" y="342" width="164" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="512" y="360" text-anchor="middle">The system shows a</text>
    <text x="512" y="375" text-anchor="middle">connection error</text>

    <rect x="410" y="414" width="204" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="512" y="432" text-anchor="middle">The user fixes or restarts</text>
    <text x="512" y="447" text-anchor="middle">the SSH tunnel</text>

    <ellipse cx="310" cy="708" rx="11" ry="11" fill="none" stroke="#222222"/>
    <ellipse cx="310" cy="708" rx="6" ry="6" fill="#222222" stroke="#222222"/>

    <line x1="310" y1="32" x2="310" y2="52" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="94" x2="310" y2="116" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="158" x2="310" y2="192" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="228" x2="310" y2="258" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="334" x2="310" y2="364" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="318" y="352" font-size="11">Yes</text>
    <line x1="310" y1="406" x2="310" y2="436" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="478" x2="310" y2="508" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="550" x2="310" y2="580" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="622" x2="310" y2="697" stroke-width="1" marker-end="url(#arrow)"/>

    <polyline points="410,296 512,296 512,342" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="452" y="288" font-size="11">No</text>
    <line x1="512" y1="384" x2="512" y2="414" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="410,435 96,435 96,207 132,207" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
</svg>
