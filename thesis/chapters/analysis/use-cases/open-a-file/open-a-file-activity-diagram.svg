<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="600px" preserveAspectRatio="none" style="width:620px;height:600px;background:#FFFFFF;" version="1.1" viewBox="0 0 620 600" width="620px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="12" fill="#000000" stroke="#181818">
    <ellipse cx="310" cy="22" rx="10" ry="10" fill="#222222" stroke="#222222"/>

    <rect x="200" y="52" width="220" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="75" text-anchor="middle">The user opens the file browser</text>

    <rect x="176" y="118" width="268" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="141" text-anchor="middle">The user searches for a file or folder</text>

    <rect x="192" y="184" width="236" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="207" text-anchor="middle">The user opens the context menu</text>

    <rect x="210" y="250" width="200" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="273" text-anchor="middle">The user selects "Open"</text>

    <polygon points="310,316 420,354 310,392 200,354" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="351" text-anchor="middle" font-size="11">Is the backend</text>
    <text x="310" y="366" text-anchor="middle" font-size="11">local?</text>

    <rect x="40" y="430" width="256" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="168" y="448" text-anchor="middle">The system asks the OS</text>
    <text x="168" y="463" text-anchor="middle">to open the path</text>

    <rect x="326" y="430" width="254" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="453" y="448" text-anchor="middle">The GUI downloads the file</text>
    <text x="453" y="463" text-anchor="middle">and opens the local copy</text>

    <ellipse cx="310" cy="548" rx="11" ry="11" fill="none" stroke="#222222"/>
    <ellipse cx="310" cy="548" rx="6" ry="6" fill="#222222" stroke="#222222"/>

    <line x1="310" y1="32" x2="310" y2="52" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="88" x2="310" y2="118" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="154" x2="310" y2="184" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="220" x2="310" y2="250" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="286" x2="310" y2="316" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="200,354 168,354 168,430" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="178" y="414" font-size="11">Yes</text>
    <polyline points="420,354 453,354 453,430" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="463" y="414" font-size="11">No</text>
    <polyline points="168,472 168,548 299,548" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="453,472 453,548 321,548" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
</svg>
