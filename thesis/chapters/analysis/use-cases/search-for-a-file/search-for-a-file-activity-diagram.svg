<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="620px" preserveAspectRatio="none" style="width:620px;height:620px;background:#FFFFFF;" version="1.1" viewBox="0 0 620 620" width="620px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="12" fill="#000000" stroke="#181818">
    <ellipse cx="310" cy="22" rx="10" ry="10" fill="#222222" stroke="#222222"/>

    <rect x="200" y="52" width="220" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="75" text-anchor="middle">The user opens the file browser</text>

    <rect x="154" y="118" width="312" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="136" text-anchor="middle">The file browser opens the user-defined</text>
    <text x="310" y="151" text-anchor="middle">home location</text>

    <rect x="112" y="190" width="396" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="208" text-anchor="middle">The application shows possible neighbors</text>
    <text x="310" y="223" text-anchor="middle">from the current location</text>

    <polygon points="310,262 420,300 310,338 200,300" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="297" text-anchor="middle" font-size="11">Wanted file</text>
    <text x="310" y="312" text-anchor="middle" font-size="11">or folder found?</text>

    <rect x="62" y="368" width="280" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="202" y="386" text-anchor="middle">The user selects another neighbor</text>
    <text x="202" y="401" text-anchor="middle">or enters a DSL search command</text>

    <rect x="168" y="470" width="284" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="493" text-anchor="middle">The system displays the selected item</text>

    <ellipse cx="310" cy="568" rx="11" ry="11" fill="none" stroke="#222222"/>
    <ellipse cx="310" cy="568" rx="6" ry="6" fill="#222222" stroke="#222222"/>

    <line x1="310" y1="32" x2="310" y2="52" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="88" x2="310" y2="118" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="160" x2="310" y2="190" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="232" x2="310" y2="262" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="200,300 202,300 202,368" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="214" y="352" font-size="11">No</text>
    <polyline points="202,410 202,436 84,436 84,211 112,211" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="310,338 310,470" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="318" y="454" font-size="11">Yes</text>
    <line x1="310" y1="506" x2="310" y2="557" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
</svg>
