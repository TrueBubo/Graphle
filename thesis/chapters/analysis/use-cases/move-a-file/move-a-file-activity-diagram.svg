<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="660px" preserveAspectRatio="none" style="width:620px;height:660px;background:#FFFFFF;" version="1.1" viewBox="0 0 620 660" width="620px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="12" fill="#000000" stroke="#181818">
    <ellipse cx="310" cy="22" rx="10" ry="10" fill="#222222" stroke="#222222"/>

    <rect x="200" y="52" width="220" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="75" text-anchor="middle">The user opens the file browser</text>

    <rect x="176" y="118" width="268" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="141" text-anchor="middle">The user searches for a file or folder</text>

    <rect x="192" y="184" width="236" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="207" text-anchor="middle">The user opens the context menu and selects "Move"</text>

    <rect x="152" y="250" width="316" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="268" text-anchor="middle">The system displays a dialog</text>
    <text x="310" y="283" text-anchor="middle">for the destination path</text>

    <polygon points="310,322 410,360 310,398 210,360" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="357" text-anchor="middle" font-size="11">Proceed with</text>
    <text x="310" y="372" text-anchor="middle" font-size="11">move?</text>

    <rect x="116" y="428" width="388" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="451" text-anchor="middle">The user enters the destination and submits the dialog</text>

    <rect x="162" y="494" width="296" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="517" text-anchor="middle">The system moves the file or folder</text>

    <rect x="132" y="560" width="356" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="578" text-anchor="middle">The system updates the stored</text>
    <text x="310" y="593" text-anchor="middle">graph location</text>

    <rect x="444" y="428" width="142" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="515" y="451" text-anchor="middle">The user cancels</text>

    <ellipse cx="310" cy="638" rx="11" ry="11" fill="none" stroke="#222222"/>
    <ellipse cx="310" cy="638" rx="6" ry="6" fill="#222222" stroke="#222222"/>

    <line x1="310" y1="32" x2="310" y2="52" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="88" x2="310" y2="118" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="154" x2="310" y2="184" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="220" x2="310" y2="250" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="292" x2="310" y2="322" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="398" x2="310" y2="428" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="318" y="416" font-size="11">Yes</text>
    <polyline points="410,360 515,360 515,428" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="454" y="352" font-size="11">No</text>
    <line x1="310" y1="464" x2="310" y2="494" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="530" x2="310" y2="560" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="602" x2="310" y2="627" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="515,464 515,638 321,638" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
</svg>
