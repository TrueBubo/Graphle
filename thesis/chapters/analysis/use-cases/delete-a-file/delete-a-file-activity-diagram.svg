<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="660px" preserveAspectRatio="none" style="width:620px;height:660px;background:#FFFFFF;" version="1.1" viewBox="0 0 620 660" width="620px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
  </defs>
  <g font-family="sans-serif" font-size="12" fill="#000000" stroke="#181818">
    <ellipse cx="310" cy="22" rx="10" ry="10" fill="#222222" stroke="#222222"/>

    <rect x="200" y="52" width="220" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="75" text-anchor="middle">The user opens the file browser</text>

    <rect x="176" y="118" width="268" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="141" text-anchor="middle">The user searches for a file or folder</text>

    <rect x="144" y="184" width="332" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="207" text-anchor="middle">The user opens the context menu and selects "Delete permanently"</text>

    <rect x="168" y="250" width="284" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="273" text-anchor="middle">The system displays a confirmation dialog</text>

    <polygon points="310,316 410,354 310,392 210,354" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="351" text-anchor="middle" font-size="11">Confirm</text>
    <text x="310" y="366" text-anchor="middle" font-size="11">deletion?</text>

    <rect x="166" y="422" width="288" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="445" text-anchor="middle">The system deletes the file or folder</text>

    <rect x="122" y="488" width="376" height="42" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="310" y="506" text-anchor="middle">The system removes the deleted item</text>
    <text x="310" y="521" text-anchor="middle">and its metadata from the graph</text>

    <rect x="444" y="422" width="142" height="36" rx="12" ry="12" fill="#F1F1F1" stroke-width="0.5"/>
    <text x="515" y="445" text-anchor="middle">The user cancels</text>

    <ellipse cx="310" cy="602" rx="11" ry="11" fill="none" stroke="#222222"/>
    <ellipse cx="310" cy="602" rx="6" ry="6" fill="#222222" stroke="#222222"/>

    <line x1="310" y1="32" x2="310" y2="52" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="88" x2="310" y2="118" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="154" x2="310" y2="184" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="220" x2="310" y2="250" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="286" x2="310" y2="316" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="392" x2="310" y2="422" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="318" y="410" font-size="11">Yes</text>
    <polyline points="410,354 515,354 515,422" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="454" y="346" font-size="11">No</text>
    <line x1="310" y1="458" x2="310" y2="488" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="310" y1="530" x2="310" y2="591" stroke-width="1" marker-end="url(#arrow)"/>
    <polyline points="515,458 515,602 321,602" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
  </g>
</svg>
