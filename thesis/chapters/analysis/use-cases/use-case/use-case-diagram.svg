<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="650px" preserveAspectRatio="none" style="width:1100px;height:650px;background:#FFFFFF;" version="1.1" viewBox="0 0 1100 650" width="1100px">
  <defs>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0,0 L8,4 L0,8 Z" fill="#181818"/>
    </marker>
